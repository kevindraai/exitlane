      <section class="app-view" data-view-panel="vpn" hidden="" id="view-vpn">
       <div class="panel-heading compact">
        <div>
         <p class="eyebrow" data-i18n="dashboard.provider_status">
          PROVIDER STATUS
         </p>
         <h2>
          NordVPN
         </h2>
        </div>
        <span class="status-pill status-neutral" data-i18n="common.loading_status" id="connection-state">
         Status ophalen&hellip;
        </span>
       </div>
       <p class="inline-error" hidden="" id="vpn-runtime-error"></p>
       <div class="metric-grid" id="provider-metrics">
        <div class="metric">
         <span data-i18n="dashboard.country">
          Land
         </span>
         <strong id="metric-country">
          &mdash;
         </strong>
        </div>
        <div class="metric">
         <span data-i18n="dashboard.city">
          Stad
         </span>
         <strong id="metric-city">
          &mdash;
         </strong>
        </div>
        <div class="metric">
         <span data-i18n="dashboard.server">
          Server
         </span>
         <strong id="metric-server">
          &mdash;
         </strong>
        </div>
        <div class="metric">
         <span data-i18n="dashboard.external_ip">
          Extern IP
         </span>
         <strong id="metric-ip">
          &mdash;
         </strong>
        </div>
        <div class="metric">
         <span data-i18n="provider.country_selection.latency">Latency</span>
         <strong id="metric-latency">
          &mdash;
         </strong>
        </div>
       </div>
       <div class="connect-form">
        <button class="button button-primary" data-i18n="provider.country_selection.reconnect" id="reconnect-button" type="button">
         Opnieuw verbinden
        </button>
        <button class="button button-danger" data-i18n="dashboard.disconnect" id="disconnect-button" type="button">
         Verbreken
        </button>
       </div>
       <div class="country-heading">
        <div>
         <p class="eyebrow" data-i18n="provider.country_selection.quick_choice">SNELLE KEUZE</p>
         <h3 data-i18n="provider.country_selection.choose_country">Kies een VPN-land</h3>
        </div>
        <button class="button button-secondary" data-i18n="provider.country_selection.measure_again" id="remeasure-countries" type="button">Opnieuw meten</button>
       </div>
       <div class="country-grid" id="quick-countries"></div>
       <details class="all-countries" id="all-countries">
        <summary data-i18n="provider.country_selection.all_countries">Alle landen</summary>
        <label class="country-search">
         <span data-i18n="provider.country_selection.search_country">Zoek land</span>
         <input autocomplete="off" data-i18n-placeholder="provider.country_selection.search_placeholder" id="country-search" placeholder="Bijv. Nederland" type="search"/>
        </label>
        <div class="country-grid" id="country-list"></div>
       </details>
      </section>
