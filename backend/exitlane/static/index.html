<!DOCTYPE html>
<html lang="nl">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width,initial-scale=1" name="viewport"/>
  <meta content="dark" name="color-scheme"/>
  <meta content="Exitlane, smart egress for every network." name="description"/>
  <title>
   Exitlane
  </title>
  <script>
   (() => {
      const storageKey = "exitlane-color-scheme";
      const preference =
        localStorage.getItem(storageKey) || "system";

      const systemDark = window.matchMedia(
        "(prefers-color-scheme: dark)",
      ).matches;

      const resolved =
        preference === "system"
          ? systemDark
            ? "dark"
            : "light"
          : preference;

      document.documentElement.dataset.colorScheme =
        resolved;

      document.documentElement.dataset.colorSchemePreference =
        preference;
    })();
  </script>
  <!-- Exitlane icons -->
  <link href="/assets/icons/favicon.ico" rel="icon" sizes="any"/>
  <link href="/assets/icons/favicon.svg" rel="icon" type="image/svg+xml"/>
  <link href="/assets/icons/apple-touch-icon.png" rel="apple-touch-icon"/>
  <link href="/assets/icons/site.webmanifest" rel="manifest"/>
  <meta content="#14203a" name="theme-color"/>
  <link href="/assets/style.css" rel="stylesheet"/>
 </head>
