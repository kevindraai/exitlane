<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Exitlane</title><link rel="stylesheet" href="/assets/style.css"></head><body><header><div class="brand"><span>⇢</span><div><b>Exitlane</b><small>Smart egress for every network</small></div></div><i id="health">loading</i></header><main><section><p class="eyebrow">FIRST-RUN WIZARD</p><h1>Build your first exit lane</h1><nav><button onclick="step(1)">1 System</button><button onclick="step(2)">2 Admin</button><button onclick="step(3)">3 Provider</button><button onclick="step(4)">4 WireGuard</button><button onclick="step(5)">5 Complete</button></nav><article id="s1"><h2>Diagnostics</h2><button class="primary" onclick="diagnostics()">Run checks</button><div id="checks"></div></article><article id="s2"><h2>Administrator</h2><input id="user" value="admin" placeholder="username"><input id="password" type="password" placeholder="minimum 12 characters"><button class="primary" onclick="admin()">Create</button></article><article id="s3"><h2>NordVPN</h2><div id="provider">not loaded</div><button onclick="installProvider()">Install</button><button onclick="defaults()">Apply defaults</button><input id="token" type="password" placeholder="Nord Account token"><button class="primary" onclick="login()">Login</button></article><article id="s4"><h2>WireGuard ingress</h2><input id="endpoint" placeholder="management IP"><input id="subnet" value="10.99.99.0/24"><input id="client" value="router"><button class="primary" onclick="wireguard()">Generate</button><pre id="wg"></pre></article><article id="s5"><h2>Ready</h2><p>Import the client configuration into your router and route one test device through it.</p><button class="primary" onclick="finish()">Finish</button></article></section><section><p class="eyebrow">LIVE STATUS</p><div id="status">—</div><div class="row"><input id="target" placeholder="Netherlands, Germany, nl1234…"><button class="primary" onclick="connect()">Connect</button><button onclick="disconnect()">Disconnect</button></div></section></main><aside id="toast" hidden></aside><script src="/assets/app.js"></script></body></html>
