name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell:
    name: Shell scripts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Check Bash syntax
        run: |
          find installer \
            -type f \
            -name "*.sh" \
            -print0 |
            xargs -0 -r -n1 bash -n

      - name: Run ShellCheck
        run: |
          find installer \
            -type f \
            -name "*.sh" \
            -print0 |
            xargs -0 -r shellcheck

  backend:
    name: Python backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install Exitlane
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Ruff
        run: ruff check .

      - name: Run Bandit
        run: bandit -c pyproject.toml -r exitlane

      - name: Audit Python dependencies
        run: pip-audit

      - name: Compile Python sources
        run: python -m compileall -q exitlane

      - name: Run tests
        run: pytest -v

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Check JavaScript syntax
        run: |
          find backend/exitlane/static/js \
            -type f \
            -name "*.js" \
            -print0 |
            xargs -0 -r -n1 node --check

      - name: Run frontend tests
        run: node --experimental-default-type=module --test frontend_tests/*.test.js

      - name: Validate JSON files
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          files = sorted(
              Path("backend/exitlane/static").rglob("*.json")
          )

          for path in files:
              with path.open(
                  encoding="utf-8"
              ) as handle:
                  json.load(handle)

              print(f"Valid JSON: {path}")
          PY

      - name: Validate translations
        run: python3 scripts/check_i18n.py

  package:
    name: Package build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - backend
      - frontend
      - shell

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build wheel and source distribution
        run: python -m build

      - name: Upload Python package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: exitlane-python-package
          path: |
            backend/dist/*.whl
            backend/dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7
