name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Check shell syntax
        run: |
          find installer -type f -name "*.sh" -print0 |
            xargs -0 -r -n1 bash -n

      - name: Run ShellCheck
        run: |
          find installer -type f -name "*.sh" -print0 |
            xargs -0 -r shellcheck

  backend:
    name: Python backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install Exitlane and development dependencies
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Run Ruff
        run: ruff check .

      - name: Run tests
        run: pytest -v
