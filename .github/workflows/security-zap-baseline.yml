name: Security ZAP passive baseline

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 5 * * 4"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zap-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Start isolated dummy instance
        run: |
          python -m pip install ./backend
          export EXITLANE_DATA_DIR="${RUNNER_TEMP}/exitlane-zap"
          python -m uvicorn exitlane.main:app --host 127.0.0.1 --port 8787 --no-server-header &
          server_pid=$!
          ready=false
          for attempt in {1..20}; do
            kill -0 "${server_pid}"
            if curl --fail --silent http://127.0.0.1:8787/api/health | grep -q '"service":"exitlane"'; then
              ready=true
              break
            fi
            sleep 1
          done
          test "${ready}" = true
      - name: Prepare ephemeral ZAP workspace
        run: |
          install -d -m 0777 "${RUNNER_TEMP}/zap-work"
          install -m 0644 security/zap/rules.tsv "${RUNNER_TEMP}/zap-work/rules.tsv"
      - name: Run passive baseline only
        run: |
          docker run --rm --network host \
            -v "${RUNNER_TEMP}/zap-work:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable@sha256:8d387b1a63e3425beef4846e39719f5af2a787753af2d8b6558c6257d7a577a2 \
            zap-baseline.py -t http://127.0.0.1:8787/ \
            -c rules.tsv -m 2
