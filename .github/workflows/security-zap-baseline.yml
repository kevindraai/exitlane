name: Security ZAP passive baseline

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 5 * * 4"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zap-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
      - name: Start isolated dummy instance
        run: |
          python -m pip install ./backend
          export EXITLANE_DATA_DIR="${RUNNER_TEMP}/exitlane-zap/data"
          export EXITLANE_CONFIG_DIR="${RUNNER_TEMP}/exitlane-zap/config"
          export EXITLANE_MASTER_KEY_FILE="${EXITLANE_CONFIG_DIR}/secret.key"
          python -m uvicorn exitlane.main:app --host 127.0.0.1 --port 8787 --no-server-header --no-proxy-headers &
          server_pid=$!
          echo "${server_pid}" > "${RUNNER_TEMP}/exitlane-zap-server.pid"
          ready=false
          for attempt in {1..20}; do
            if ! kill -0 "${server_pid}" 2>/dev/null; then
              wait "${server_pid}" || true
              echo "ExitLane stopped before its health endpoint became ready." >&2
              exit 1
            fi
            if curl --fail --silent http://127.0.0.1:8787/api/health | grep -q '"service":"exitlane"'; then
              ready=true
              break
            fi
            sleep 1
          done
          test "${ready}" = true
      - name: Prepare ephemeral ZAP workspace
        run: |
          install -d -m 0777 "${RUNNER_TEMP}/zap-work"
          install -m 0644 security/zap/rules.tsv "${RUNNER_TEMP}/zap-work/rules.tsv"
      - name: Run passive baseline only
        run: |
          docker run --rm --network host \
            -v "${RUNNER_TEMP}/zap-work:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable@sha256:8d387b1a63e3425beef4846e39719f5af2a787753af2d8b6558c6257d7a577a2 \
            zap-baseline.py -t http://127.0.0.1:8787/ \
            -c rules.tsv -m 2
      - name: Stop isolated dummy instance
        if: always()
        run: |
          pid_file="${RUNNER_TEMP}/exitlane-zap-server.pid"
          if [[ -f "${pid_file}" ]]; then
            server_pid="$(cat "${pid_file}")"
            kill "${server_pid}" 2>/dev/null || true
            wait "${server_pid}" 2>/dev/null || true
          fi
